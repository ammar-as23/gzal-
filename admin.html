<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم - ستالايت المملكة</title>
    
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- مكتبة EmailJS لإرسال الإيميلات -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script src="admin-script.js" defer></script>
</head>
<body>

<div class="admin-container">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <i class="fas fa-crown" style="font-size: 48px; color: #D4AF37; margin-bottom: 20px;"></i>
            <h2>لوحة تحكم ستالايت المملكة</h2>
            <input type="password" id="adminPassword" placeholder="أدخل كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
            <button onclick="checkLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <p style="margin-top: 15px; font-size: 12px; color: #94a3b8;">كلمة السر الافتراضية: <strong>admin123</strong></p>
        </div>
    </div>

    <!-- لوحة التحكم (تظهر بعد تسجيل الدخول) -->
    <div id="adminPanel" style="display: none;">
        <div class="admin-header">
            <h2><i class="fas fa-crown"></i> لوحة تحكم ستالايت المملكة</h2>
            <div class="admin-stats">
                <div class="stat-card"><i class="fas fa-box"></i> <span id="totalProducts">0</span> منتج</div>
                <div class="stat-card"><i class="fas fa-shopping-cart"></i> <span id="totalOrders">0</span> طلب</div>
                <div class="stat-card"><i class="fas fa-hourglass-half"></i> <span id="pendingOrders">0</span> قيد المراجعة</div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab-btn active" onclick="showTab('products')"><i class="fas fa-boxes"></i> المنتجات</button>
            <button class="admin-tab-btn" onclick="showTab('add-product')"><i class="fas fa-plus-circle"></i> إضافة منتج</button>
            <button class="admin-tab-btn" onclick="showTab('orders')"><i class="fas fa-truck"></i> الطلبات</button>
        </div>

        <!-- تبويب المنتجات -->
        <div id="productsTab" class="admin-tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3><i class="fas fa-list"></i> قائمة المنتجات</h3>
                <button class="btn-primary" onclick="loadProductsData()"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="productsList"></div>
        </div>

        <!-- تبويب إضافة منتج -->
        <div id="addProductTab" class="admin-tab-content">
            <h3><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
            <div class="form-card">
                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="newProductName" placeholder="مثال: Gazal 9090 Ultra">
                </div>
                <div class="form-group">
                    <label>السعر القديم (قبل الخصم)</label>
                    <input type="number" id="newOldPrice" placeholder="599">
                </div>
                <div class="form-group">
                    <label>السعر الحالي</label>
                    <input type="number" id="newPrice" placeholder="499">
                </div>
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="text" id="newImageUrl" placeholder="https://i.postimg.cc/xxx/image.jpg">
                </div>
                <div class="form-group">
                    <label>وصف قصير</label>
                    <textarea id="newDescription" rows="3" placeholder="وصف المنتج..."></textarea>
                </div>
                <button class="btn-primary" onclick="addNewProduct()"><i class="fas fa-save"></i> إضافة المنتج</button>
            </div>
        </div>

        <!-- تبويب الطلبات -->
        <div id="ordersTab" class="admin-tab-content">
            <h3><i class="fas fa-truck"></i> إدارة الطلبات</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>التاريخ</th><th>العميل</th><th>الجوال</th><th>المدينة</th><th>المنتجات</th><th>الإجمالي</th><th>ملاحظات</th><th>الحالة</th><th>إجراءات</th>
                    </thead>
                    <tbody id="ordersList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js" defer></script>
</body>
</html>
